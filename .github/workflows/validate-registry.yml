name: validate-registry

on:
  pull_request:
    paths:
      - "registry/apps/*.app.json"
      - "schema/app-record.schema.json"
      - "package.json"
      - "package-lock.json"
      - "scripts/validate-registry.cjs"
      - "scripts/registry-app"
      - "scripts/en/registry-app"
      - ".github/workflows/validate-registry.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Validate registry app files
        run: npm run validate:registry
